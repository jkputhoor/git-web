<!DOCTYPE html>
<html>
<head>
    <title>Broadcast Dashboard</title>
</head>
<body>

<h2>Available Broadcasts</h2>

<button onclick="loadFile('india_broadcast.txt')">India</button>
<button onclick="loadFile('uk_broadcast.txt')">UK</button>

<pre id="content"></pre>

<script>
function loadFile(file) {
    fetch(file)
    .then(res => res.text())
    .then(data => {
        document.getElementById('content').innerText = data;
    });
}
</script>

</body>
</html>
